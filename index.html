<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGIS 3D – Cây xanh Đại học Cần Thơ</title>

    <!-- CesiumJS v1.105 -->
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.105/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.105/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body, #cesiumContainer {
            width: 100%; height: 100%; overflow: hidden;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0d1117;
        }

        /* ===================== PANEL TRÁI ===================== */
        #panel {
            position: absolute;
            top: 20px; left: 20px;
            width: 300px;
            background: rgba(13, 17, 23, 0.92);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            padding: 18px;
            z-index: 1000;
            color: #e6edf3;
            backdrop-filter: blur(8px);
            transition: transform 0.3s ease;
        }

        #panel h3 {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.08em;
            color: #7ee787;
            text-transform: uppercase;
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .field-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 13px;
        }
        .field-label { color: #8b949e; }
        .field-value {
            font-weight: 600;
            color: #e6edf3;
            text-align: right;
            max-width: 160px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Ô nhập DBH */
        .dbh-group {
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .dbh-group label {
            display: block;
            font-size: 12px;
            color: #8b949e;
            margin-bottom: 6px;
        }
        .dbh-input-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        #treeDBH {
            flex: 1;
            padding: 7px 10px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            color: #e6edf3;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        #treeDBH:focus { border-color: #7ee787; }
        #treeDBH::-webkit-inner-spin-button { opacity: 1; }

        /* Kết quả Carbon */
        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 14px;
        }
        .result-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }
        .result-card.full { grid-column: 1 / -1; }
        .result-unit {
            font-size: 10px;
            color: #8b949e;
            margin-bottom: 3px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .result-val {
            font-size: 18px;
            font-weight: 700;
        }
        .val-agb  { color: #79c0ff; }
        .val-c    { color: #7ee787; }
        .val-co2  { color: #ffa657; }
        .val-bgb  { color: #d2a8ff; }

        /* Placeholder khi chưa chọn cây */
        #placeholder {
            text-align: center;
            padding: 20px 0;
            color: #484f58;
            font-size: 13px;
            line-height: 1.6;
        }
        #placeholder .icon { font-size: 32px; margin-bottom: 8px; }

        /* ===================== THỐNG KÊ GÓC PHẢI ===================== */
        #stats {
            position: absolute;
            top: 20px; right: 20px;
            background: rgba(13, 17, 23, 0.88);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 14px 18px;
            z-index: 1000;
            color: #e6edf3;
            font-size: 13px;
            backdrop-filter: blur(8px);
            min-width: 200px;
        }
        #stats h4 {
            font-size: 11px;
            color: #7ee787;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 10px;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            gap: 16px;
        }
        .stat-lbl { color: #8b949e; }
        .stat-val { font-weight: 700; color: #e6edf3; }

        /* ===================== LOADING ===================== */
        #loadingOverlay {
            position: absolute;
            inset: 0;
            background: rgba(13, 17, 23, 0.92);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            color: #e6edf3;
        }
        .spinner {
            width: 44px; height: 44px;
            border: 3px solid rgba(126,231,135,0.2);
            border-top-color: #7ee787;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loadMsg { font-size: 14px; color: #8b949e; margin-top: 8px; }
        #loadPct  { font-size: 28px; font-weight: 700; color: #7ee787; }

        /* ===================== NÚT CÔNG CỤ ===================== */
        #toolbar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 1000;
        }
        .tool-btn {
            background: rgba(13,17,23,0.9);
            border: 1px solid rgba(255,255,255,0.15);
            color: #e6edf3;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: all 0.2s;
        }
        .tool-btn:hover { background: rgba(126,231,135,0.15); border-color: #7ee787; color: #7ee787; }
        .tool-btn.active { background: rgba(126,231,135,0.2); border-color: #7ee787; color: #7ee787; }
    </style>
</head>
<body>

<!-- Loading overlay -->
<div id="loadingOverlay">
    <div class="spinner"></div>
    <div id="loadPct">0%</div>
    <div id="loadMsg">Đang tải dữ liệu cây xanh...</div>
</div>

<!-- Panel thông tin cây (bên trái) -->
<div id="panel">
    <h3>🌳 Thông tin cây xanh</h3>
    <div id="placeholder">
        <div class="icon">📍</div>
        Nhấp vào một cây<br>trên bản đồ để xem thông tin
    </div>
    <div id="treeInfo" style="display:none">
        <div class="field-row">
            <span class="field-label">Mã số cây</span>
            <span class="field-value" id="fId">—</span>
        </div>
        <div class="field-row">
            <span class="field-label">Loại cây</span>
            <span class="field-value" id="fType">—</span>
        </div>
        <div class="field-row">
            <span class="field-label">Tọa độ</span>
            <span class="field-value" id="fCoord">—</span>
        </div>

        <div class="dbh-group">
            <label>Đường kính ngang ngực DBH (cm) — có thể chỉnh sửa:</label>
            <div class="dbh-input-row">
                <input type="number" id="treeDBH" step="0.1" min="1" max="300" value="15">
            </div>
        </div>

        <div class="result-grid">
            <div class="result-card">
                <div class="result-unit">AGB (kg)</div>
                <div class="result-val val-agb" id="rAGB">0</div>
            </div>
            <div class="result-card">
                <div class="result-unit">BGB (kg)</div>
                <div class="result-val val-bgb" id="rBGB">0</div>
            </div>
            <div class="result-card">
                <div class="result-unit">Carbon (kg C)</div>
                <div class="result-val val-c" id="rC">0</div>
            </div>
            <div class="result-card">
                <div class="result-unit">CO₂ hấp thụ (kg)</div>
                <div class="result-val val-co2" id="rCO2">0</div>
            </div>
        </div>
    </div>
</div>

<!-- Thống kê tổng hợp góc phải -->
<div id="stats">
    <h4>📊 Thống kê toàn khu</h4>
    <div class="stat-row">
        <span class="stat-lbl">Tổng số cây</span>
        <span class="stat-val" id="sTotalTrees">—</span>
    </div>
    <div class="stat-row">
        <span class="stat-lbl">Tổng Carbon</span>
        <span class="stat-val" id="sTotalC">—</span>
    </div>
    <div class="stat-row">
        <span class="stat-lbl">Tổng CO₂</span>
        <span class="stat-val" id="sTotalCO2">—</span>
    </div>
    <div class="stat-row">
        <span class="stat-lbl">AGB trung bình</span>
        <span class="stat-val" id="sAvgAGB">—</span>
    </div>
</div>

<!-- Nút công cụ -->
<div id="toolbar">
    <button class="tool-btn active" id="btn3D" onclick="setView('3d')">🌐 3D</button>
    <button class="tool-btn" id="btn2D" onclick="setView('2d')">🗺️ 2D</button>
    <button class="tool-btn" onclick="flyToExtent()">📍 Về ĐH Cần Thơ</button>
</div>

<!-- Cesium container -->
<div id="cesiumContainer"></div>

<script>
    // =====================================================================
    //  CẤU HÌNH — Chỉnh các giá trị này theo dữ liệu thực của bạn
    // =====================================================================
    const CONFIG = {
        // Token Cesium Ion (miễn phí tại https://ion.cesium.com)
        // Thay YOUR_TOKEN_HERE bằng token thực của bạn
        cesiumToken: 'YOUR_CESIUM_ION_TOKEN_HERE',

        // Tọa độ trung tâm Khu II ĐH Cần Thơ (kinh độ, vĩ độ, độ cao camera)
        centerLng: 105.7684,
        centerLat: 10.0306,
        cameraHeight: 400,

        // Tên file dữ liệu (để trong cùng thư mục với index.html)
        geojsonFile: 'ctu_carbon.geojson',
        glbFile: 'tree.glb',

        // Tên các cột trong bảng thuộc tính shapefile của bạn
        // (kiểm tra lại bằng cách mở attribute table trong QGIS)
        fieldId:   'Number_tre',   // cột mã số cây
        fieldType: 'Type_tree',    // cột loại cây
        fieldDBH:  'DBH1.3',       // cột đường kính DBH

        // Scale của model GLB — điều chỉnh để cây hiển thị đúng kích thước
        // Bắt đầu với 1.0, nếu quá to/nhỏ thì tăng/giảm
        modelScale: 1.0,

        // Công thức tính AGB: Chave et al. 2014 đơn giản hóa
        // AGB = a * DBH^b  (đơn vị kg)
        // Giá trị mặc định cho cây nhiệt đới hỗn hợp:
        agbCoeff_a: 0.0509,
        agbCoeff_b: 2.0,

        // Tỉ lệ BGB/AGB (sinh khối dưới đất)
        bgbRatio: 0.26,

        // Hàm lượng Carbon trong sinh khối khô (IPCC 2006)
        carbonFraction: 0.47,

        // Hệ số chuyển đổi C → CO2
        co2Factor: 3.667,
    };

    // =====================================================================
    //  KHỞI TẠO CESIUM
    // =====================================================================
    Cesium.Ion.defaultAccessToken = CONFIG.cesiumToken;

    const viewer = new Cesium.Viewer('cesiumContainer', {
        terrainProvider: Cesium.createWorldTerrain(),
        animation: false,
        timeline: false,
        infoBox: false,
        baseLayerPicker: false,
        geocoder: false,
        navigationHelpButton: false,
        sceneModePicker: false,
        homeButton: false,
        fullscreenButton: false,
        // Bật lighting thực tế để model 3D đẹp hơn
        shadows: true,
    });

    // Thêm nền ảnh vệ tinh Bing Maps (rõ hơn cho khuôn viên ĐH)
    viewer.imageryLayers.addImageryProvider(
        new Cesium.IonImageryProvider({ assetId: 2 }) // Bing Aerial
    );

    // =====================================================================
    //  HÀM TÍNH CARBON — theo công thức Chave et al. 2014
    // =====================================================================
    function calcCarbon(dbh) {
        const agb  = CONFIG.agbCoeff_a * Math.pow(dbh, CONFIG.agbCoeff_b);
        const bgb  = agb * CONFIG.bgbRatio;
        const c    = (agb + bgb) * CONFIG.carbonFraction;
        const co2  = c * CONFIG.co2Factor;
        return {
            agb:  +agb.toFixed(2),
            bgb:  +bgb.toFixed(2),
            c:    +c.toFixed(2),
            co2:  +co2.toFixed(2),
        };
    }

    // =====================================================================
    //  TẢI GEOJSON VÀ ĐẶT MODEL 3D
    //  Dùng Cesium Entity API + 3D Tiles / Model primitive
    //  cho hiệu năng với 6000 điểm
    // =====================================================================
    let allEntities = [];  // lưu tham chiếu để tính tổng thống kê
    let selectedEntity = null;

    function loadTrees(geojsonData) {
        const features = geojsonData.features;
        updateLoadMsg(`Đang dựng ${features.length} model cây...`, 50);

        // Dùng ClusteringEnabled để giảm tải render khi zoom out
        // (tự tắt khi zoom vào gần)
        viewer.dataSources.add(Cesium.GeoJsonDataSource.load(CONFIG.geojsonFile, {
            // Không dùng GeoJsonDataSource cho model — chỉ dùng để khai thác
            // entity loop bên dưới
        }));

        let totalAGB = 0, totalC = 0, totalCO2 = 0;

        features.forEach((feature, idx) => {
            const coords = feature.geometry.coordinates;  // [lng, lat]
            const props  = feature.properties;

            const dbh  = parseFloat(props[CONFIG.fieldDBH]) || 15.0;
            const calc = calcCarbon(dbh);

            totalAGB += calc.agb;
            totalC   += calc.c;
            totalCO2 += calc.co2;

            // Đặt model GLB tại vị trí từng cây
            const entity = viewer.entities.add({
                position: Cesium.Cartesian3.fromDegrees(coords[0], coords[1], 0),
                // Model 3D GLB — Cesium tự scale và orient
                model: {
                    uri: CONFIG.glbFile,
                    scale: CONFIG.modelScale,
                    minimumPixelSize: 8,          // Không nhỏ hơn 8px khi zoom out
                    maximumScale: 20000,
                    heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
                    // Tắt khi quá xa (tối ưu hiệu năng 6000 cây)
                    distanceDisplayCondition: new Cesium.DistanceDisplayCondition(0, 800),
                },
                // Fallback: điểm tròn khi zoom out xa > 800m
                point: {
                    pixelSize: 6,
                    color: Cesium.Color.fromCssColorString('#7ee787').withAlpha(0.85),
                    outlineColor: Cesium.Color.WHITE.withAlpha(0.3),
                    outlineWidth: 1,
                    heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
                    distanceDisplayCondition: new Cesium.DistanceDisplayCondition(800, Number.MAX_VALUE),
                },
                // Lưu thuộc tính vào entity
                properties: new Cesium.PropertyBag({
                    id:    props[CONFIG.fieldId]   ?? `Tree_${idx + 1}`,
                    type:  props[CONFIG.fieldType]  ?? 'Không rõ',
                    dbh:   dbh,
                    lng:   coords[0],
                    lat:   coords[1],
                    agb:   calc.agb,
                    bgb:   calc.bgb,
                    c:     calc.c,
                    co2:   calc.co2,
                }),
            });

            allEntities.push(entity);

            // Cập nhật % loading mỗi 500 cây
            if (idx % 500 === 0) {
                const pct = Math.round(50 + (idx / features.length) * 45);
                updateLoadMsg(`Đang dựng cây ${idx}/${features.length}...`, pct);
            }
        });

        // Cập nhật thống kê tổng hợp
        document.getElementById('sTotalTrees').textContent = features.length.toLocaleString('vi-VN');
        document.getElementById('sTotalC').textContent     = (totalC / 1000).toFixed(1) + ' tấn C';
        document.getElementById('sTotalCO2').textContent   = (totalCO2 / 1000).toFixed(1) + ' tấn CO₂';
        document.getElementById('sAvgAGB').textContent     = (totalAGB / features.length).toFixed(1) + ' kg';

        // Ẩn loading overlay
        updateLoadMsg('Hoàn tất!', 100);
        setTimeout(() => {
            document.getElementById('loadingOverlay').style.opacity = '0';
            document.getElementById('loadingOverlay').style.transition = 'opacity 0.5s';
            setTimeout(() => document.getElementById('loadingOverlay').style.display = 'none', 500);
        }, 400);

        // Bay đến khuôn viên ĐH Cần Thơ
        flyToExtent();
    }

    function updateLoadMsg(msg, pct) {
        document.getElementById('loadMsg').textContent = msg;
        document.getElementById('loadPct').textContent = pct + '%';
    }

    // =====================================================================
    //  XỬ LÝ CLICK CHỌN CÂY
    // =====================================================================
    const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);

    handler.setInputAction(function(movement) {
        const picked = viewer.scene.pick(movement.position);

        if (!Cesium.defined(picked) || !picked.id || !picked.id.properties) return;

        selectedEntity = picked.id;
        const p = selectedEntity.properties;

        // Hiển thị panel thông tin
        document.getElementById('placeholder').style.display = 'none';
        document.getElementById('treeInfo').style.display    = 'block';

        // Điền dữ liệu cây
        document.getElementById('fId').textContent    = p.id.getValue();
        document.getElementById('fType').textContent  = p.type.getValue();
        document.getElementById('fCoord').textContent =
            p.lng.getValue().toFixed(5) + ', ' + p.lat.getValue().toFixed(5);

        const dbh = p.dbh.getValue();
        document.getElementById('treeDBH').value = dbh;
        showCalcResult(calcCarbon(dbh));

        // Làm nổi bật cây được chọn (scale to lên)
        selectedEntity.model.scale = CONFIG.modelScale * 1.5;

    }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

    // =====================================================================
    //  TỰ ĐỘNG TÍNH KHI SỬA DBH
    // =====================================================================
    document.getElementById('treeDBH').addEventListener('input', function(e) {
        const newDBH = parseFloat(e.target.value);
        if (!selectedEntity || isNaN(newDBH) || newDBH <= 0) return;

        const calc = calcCarbon(newDBH);
        showCalcResult(calc);

        // Cập nhật lại properties của entity
        selectedEntity.properties.dbh.setValue(newDBH);
        selectedEntity.properties.agb.setValue(calc.agb);
        selectedEntity.properties.bgb.setValue(calc.bgb);
        selectedEntity.properties.c.setValue(calc.c);
        selectedEntity.properties.co2.setValue(calc.co2);

        // Scale model theo DBH mới (to nhỏ theo kích thước cây)
        const scaleByDBH = CONFIG.modelScale * (0.5 + newDBH / 50);
        selectedEntity.model.scale = scaleByDBH;
    });

    function showCalcResult(calc) {
        document.getElementById('rAGB').textContent  = calc.agb.toLocaleString('vi-VN');
        document.getElementById('rBGB').textContent  = calc.bgb.toLocaleString('vi-VN');
        document.getElementById('rC').textContent    = calc.c.toLocaleString('vi-VN');
        document.getElementById('rCO2').textContent  = calc.co2.toLocaleString('vi-VN');
    }

    // =====================================================================
    //  CHUYỂN CHẾ ĐỘ XEM 2D / 3D
    // =====================================================================
    function setView(mode) {
        document.getElementById('btn3D').classList.toggle('active', mode === '3d');
        document.getElementById('btn2D').classList.toggle('active', mode === '2d');

        if (mode === '3d') {
            viewer.scene.morphTo3D(1.0);
        } else {
            viewer.scene.morphTo2D(1.0);
        }
    }

    function flyToExtent() {
        viewer.camera.flyTo({
            destination: Cesium.Cartesian3.fromDegrees(
                CONFIG.centerLng,
                CONFIG.centerLat,
                CONFIG.cameraHeight
            ),
            orientation: {
                heading: 0,
                pitch: Cesium.Math.toRadians(-50),
                roll: 0
            },
            duration: 2.0
        });
    }

    // =====================================================================
    //  FETCH GEOJSON VÀ KHỞI ĐỘNG
    // =====================================================================
    fetch(CONFIG.geojsonFile)
        .then(res => {
            if (!res.ok) throw new Error(`Không tìm thấy ${CONFIG.geojsonFile} (HTTP ${res.status})`);
            updateLoadMsg('Đang phân tích dữ liệu...', 30);
            return res.json();
        })
        .then(data => loadTrees(data))
        .catch(err => {
            document.getElementById('loadMsg').textContent =
                '❌ Lỗi: ' + err.message + '\nKiểm tra lại tên file GeoJSON trong CONFIG.';
            document.getElementById('loadPct').textContent = '!';
            console.error(err);
        });

</script>
</body>
</html>
